<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanctum Librorum</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070d;--surface:#0d0d18;--card:#111120;--card-hover:#181828;
      --gold:#e8c96a;--gold-bright:#f5d980;--gold-dim:rgba(232,201,106,.18);--gold-glow:rgba(232,201,106,.08);
      --text:#e6dfd4;--text-muted:#8a8290;--border:#1e1c2e;--border-gold:rgba(232,201,106,.38);
      --owned:#3d8b6e;--read:#c9a84c;--wishlist:#8b5a9a;
      --owned-bg:rgba(61,139,110,.14);--read-bg:rgba(201,168,76,.11);--wishlist-bg:rgba(139,90,154,.14);
      --radius:3px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'EB Garamond',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.022;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ── AUTH ── */
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(232,201,106,.08) 0%,transparent 65%),
                 radial-gradient(ellipse 40% 40% at 80% 80%,rgba(139,90,154,.05) 0%,transparent 60%),var(--bg)}
    .auth-panel{background:var(--surface);border:1px solid var(--border-gold);padding:3rem 2.5rem;
      width:100%;max-width:440px;position:relative;box-shadow:0 0 60px rgba(232,201,106,.05),0 20px 40px rgba(0,0,0,.5)}
    .auth-panel::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
      border:1px solid rgba(232,201,106,.09);pointer-events:none}
    .corner{position:absolute;width:18px;height:18px;border-color:var(--gold);border-style:solid}
    .corner-tl{top:-1px;left:-1px;border-width:2px 0 0 2px}.corner-tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
    .corner-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}.corner-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
    .auth-logo{text-align:center;margin-bottom:2.5rem}
    .aquila{font-size:2.6rem;color:var(--gold-bright);display:block;margin-bottom:.75rem;
      filter:drop-shadow(0 0 14px rgba(232,201,106,.5))}
    .auth-logo h1{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;letter-spacing:.18em;
      color:var(--gold-bright);text-transform:uppercase}
    .auth-logo p{font-size:.82rem;color:var(--text-muted);letter-spacing:.1em;margin-top:.5rem;font-style:italic}
    .auth-div{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;opacity:.5}
    .auth-div::before,.auth-div::after{content:'';flex:1;height:1px;background:var(--border-gold)}
    .auth-div span{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .auth-tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid var(--border)}
    .auth-tab{flex:1;padding:.75rem;background:none;border:none;font-family:'Cinzel',serif;font-size:.72rem;
      letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;
      border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
    .auth-tab.active{color:var(--gold-bright);border-bottom-color:var(--gold)}
    .fg{margin-bottom:1.25rem}
    .fg label{display:block;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.16em;
      text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem}
    .fg input{width:100%;padding:.75rem 1rem;background:var(--bg);border:1px solid var(--border);
      color:var(--text);font-family:'EB Garamond',serif;font-size:1rem;outline:none;
      transition:border-color .2s,box-shadow .2s;border-radius:var(--radius)}
    .fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .btn-primary{width:100%;padding:.85rem;background:linear-gradient(135deg,#d4a93c 0%,#b08830 100%);
      color:#0a0808;border:none;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;
      letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .1s;
      border-radius:var(--radius);margin-top:.5rem}
    .btn-primary:hover{opacity:.88}.btn-primary:active{transform:scale(.99)}.btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .auth-msg{padding:.75rem 1rem;font-size:.9rem;border-radius:var(--radius);margin-bottom:1rem}
    .auth-msg.error{background:rgba(180,60,60,.12);border:1px solid rgba(180,60,60,.35);color:#e07070}
    .auth-msg.success{background:rgba(61,139,110,.12);border:1px solid rgba(61,139,110,.35);color:#6dbfa0}

    /* ── APP ── */
    .app{display:none}.app.visible{display:block}

    /* ── HEADER ── */
    header{background:var(--surface);border-bottom:1px solid var(--border-gold);padding:0 2rem;
      display:flex;align-items:center;justify-content:space-between;height:58px;
      position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.45)}
    .h-brand{display:flex;align-items:center;gap:.65rem}
    .h-aquila{color:var(--gold-bright);font-size:1.2rem;filter:drop-shadow(0 0 6px rgba(232,201,106,.5))}
    .h-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:.18em;
      color:var(--gold-bright);text-transform:uppercase;text-shadow:0 0 18px rgba(232,201,106,.35)}
    .h-sub{font-family:'EB Garamond',serif;font-size:.8rem;color:#b0a898;font-style:italic;margin-left:.25rem}
    .h-right{display:flex;align-items:center;gap:1.25rem}
    .h-email{font-size:.8rem;color:var(--text-muted);font-style:italic;max-width:180px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-logout{padding:.35rem .85rem;background:none;border:1px solid var(--border);color:var(--text-muted);
      font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
      cursor:pointer;transition:border-color .2s,color .2s;border-radius:var(--radius)}
    .btn-logout:hover{border-color:rgba(232,201,106,.5);color:var(--gold)}

    /* ── STATS ── */
    .stats{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 2rem;
      display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
    .stat{display:flex;align-items:baseline;gap:.4rem;padding:0 .85rem}
    .stat:first-child{padding-left:0}
    .sv{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--gold-bright);line-height:1}
    .sl{font-size:.78rem;letter-spacing:.07em;color:var(--text-muted);text-transform:uppercase;font-family:'Cinzel',serif}
    .sdiv{width:1px;height:24px;background:var(--border);flex-shrink:0}

    /* ── CONTROLS ── */
    .ctrl-wrap{background:rgba(7,7,13,.78);border-bottom:1px solid var(--border);
      position:sticky;top:58px;z-index:90;backdrop-filter:blur(10px)}
    .ctrl-row{padding:.65rem 2rem;display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;
      border-bottom:1px solid rgba(30,28,46,.5)}
    .ctrl-row:last-child{border-bottom:none}
    .rl{font-family:'Cinzel',serif;font-size:.69rem;letter-spacing:.14em;text-transform:uppercase;
      color:#ddd7cc;white-space:nowrap;min-width:50px;margin-right:.2rem}
    .pill{padding:.3rem .72rem;border:1px solid #3a3650;background:none;color:#cec8be;
      font-family:'Cinzel',serif;font-size:.69rem;letter-spacing:.09em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;border-radius:2px;white-space:nowrap}
    .pill:hover{border-color:rgba(232,201,106,.4);color:var(--text)}
    .pill.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-bright)}
    .pill[data-type="Novel"].active{background:rgba(65,120,200,.15);border-color:#4178c8;color:#8abbff}
    .pill[data-type="Novella"].active{background:rgba(80,160,120,.15);border-color:#50a078;color:#8edfc0}
    .pill[data-type="Anthology"].active{background:rgba(160,100,180,.15);border-color:#a064b4;color:#d0a0f0}
    .pill[data-type="Omnibus"].active{background:rgba(200,140,50,.15);border-color:#c88c32;color:#f0c070}
    .pill[data-type="Audio Drama"].active{background:rgba(200,80,80,.15);border-color:#c85050;color:#f0a0a0}
    .pill[data-type="eBook"].active{background:rgba(80,160,180,.15);border-color:#50a0b4;color:#90dcf0}
    .pill[data-type="Series"].active{background:rgba(180,150,50,.18);border-color:#b49632;color:#f0d070}
    .ctrl-right{margin-left:auto;display:flex;gap:.5rem}
    .srch{padding:.38rem .82rem;background:var(--surface);border:1px solid var(--border);color:var(--text);
      font-family:'EB Garamond',serif;font-size:.92rem;outline:none;border-radius:var(--radius);
      width:190px;transition:border-color .2s}
    .srch:focus{border-color:rgba(232,201,106,.5)}
    .srch::placeholder{color:#9a94a2}
    .subj-sel{padding:.38rem .82rem;background:var(--surface);border:1px solid #3a3650;
      color:#cec8be;font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.05em;
      text-transform:uppercase;outline:none;border-radius:var(--radius);cursor:pointer;
      transition:border-color .2s;max-width:220px}
    .subj-sel:focus{border-color:rgba(232,201,106,.5)}
    .subj-sel option{background:#0d0d18;font-family:sans-serif;text-transform:none;font-size:.88rem}

    /* ── RESULT INFO ── */
    .rinfo{padding:.32rem 2rem;font-size:.86rem;color:var(--text-muted);font-style:italic;
      background:var(--bg);border-bottom:1px solid var(--border)}

    /* ── GRID & CARDS ── */
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:0 2rem}
    
    
    
    .card-thumb{width:80px;aspect-ratio:2/3;background:#0a0a14;
      border:1px solid #2a2840;overflow:hidden;display:flex;align-items:center;
      justify-content:center;flex-shrink:0}
    
    
    .card:hover{background:var(--card-hover)}

    /* cover image */
    .cover-wrap{display:none}
    .cover-img{width:100%;height:100%;object-fit:contain;display:none}
    .cover-img.loaded{display:block}
    .cover-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100%;height:100%;gap:.4rem;padding:.5rem}
    .cover-placeholder .cp-aquila{font-size:1.6rem;color:var(--gold);opacity:.25}
    .cover-placeholder .cp-title{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-muted);opacity:.45;text-align:center;line-height:1.4}
    .cover-img.loaded + .cover-placeholder{display:none}

    .card-header-row{display:flex;align-items:center;margin-bottom:.32rem;gap:.4rem;flex-wrap:nowrap}
    .c-pipe{color:rgba(232,201,106,.3);font-size:.6rem;margin:0 .1rem}
    .card{background:var(--card);padding:.85rem 1rem 1rem;transition:background .15s;
      display:flex;flex-direction:column;cursor:pointer;gap:.18rem}
    .card-body{display:flex;gap:.7rem;margin-bottom:.65rem}
    .card-meta-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:.18rem}
    .card-cover-col{width:80px;flex-shrink:0;display:flex;align-items:stretch}
    .card-thumb{width:80px;aspect-ratio:2/3;background:#0a0a14;
      border:1px solid #2a2840;overflow:hidden;display:flex;align-items:center;
      justify-content:center;flex-shrink:0}
    .card-thumb img{width:100%;height:100%;object-fit:contain}
    .ct-ph{font-size:.75rem;color:var(--gold);opacity:.15}
    .card-subject{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--gold-bright);opacity:.85}
    
    .cascade-note{font-size:.54rem;font-style:italic;color:var(--text-muted);opacity:.65;margin-top:.15rem}
    .c-subj{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--gold-bright);opacity:.9;line-height:1.3;flex:1}
    .tbadge{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.07em;text-transform:uppercase;
      padding:.16rem .4rem;border-radius:2px;white-space:nowrap;flex-shrink:0}
    .t-Novel{background:rgba(65,120,200,.15);border:1px solid rgba(65,120,200,.3);color:#8abbff}
    .t-Novella{background:rgba(80,160,120,.15);border:1px solid rgba(80,160,120,.3);color:#8edfc0}
    .t-Anthology{background:rgba(160,100,180,.15);border:1px solid rgba(160,100,180,.3);color:#d0a0f0}
    .t-Omnibus{background:rgba(200,140,50,.15);border:1px solid rgba(200,140,50,.3);color:#f0c070}
    .t-AudioDrama{background:rgba(200,80,80,.15);border:1px solid rgba(200,80,80,.3);color:#f0a0a0}
    .t-eBook{background:rgba(80,160,180,.15);border:1px solid rgba(80,160,180,.3);color:#90dcf0}
    .c-title{font-family:'Cinzel',serif;font-size:.96rem;font-weight:600;color:var(--text);
      line-height:1.35;margin-bottom:.22rem;flex:1}
    .c-meta{font-size:.9rem;font-style:italic;color:#9a94a0;margin-bottom:.75rem}
    .c-actions{display:flex;gap:.28rem}
    .sbtn{flex:1;padding:.38rem .1rem;border-radius:2px;border:1px solid #3a3650;background:none;
      color:#b8b2ac;font-size:.68rem;font-family:'Cinzel',serif;letter-spacing:.06em;
      text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;
      justify-content:center;gap:.18rem;white-space:nowrap}
    .sbtn:hover{color:var(--text);border-color:#444}
    .sbtn.owned{background:var(--owned-bg);border-color:var(--owned);color:#6dcfa6}
    .sbtn.read{background:var(--read-bg);border-color:var(--read);color:var(--gold-bright)}
    .sbtn.wishlist{background:var(--wishlist-bg);border-color:var(--wishlist);color:#c090d0}

    .loading,.no-res{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text-muted)}
    .spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border);
      border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p,.no-res p{font-style:italic;font-size:.9rem;margin-top:.5rem}

    ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(232,201,106,.3)}

    @media(max-width:680px){
      header{padding:0 1rem}.h-sub,.h-email{display:none}
      .stats{padding:.7rem 1rem;gap:0}.stat{padding:0 .5rem}.sv{font-size:1.1rem}
      .ctrl-row{padding:.55rem 1rem}.ctrl-right{margin-left:0;width:100%}.srch{width:100%}
      .rinfo{padding:.3rem 1rem}
    }
  
    /* ── MODAL ────────────────────────────────────────────────── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
      display:flex;align-items:center;justify-content:center;padding:1.5rem;
      backdrop-filter:blur(4px);animation:fadeIn .15s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-panel{background:var(--surface);border:1px solid var(--border-gold);
      width:100%;max-width:820px;height:88vh;max-height:660px;overflow:hidden;position:relative;display:flex;flex-direction:column;
      box-shadow:0 0 80px rgba(232,201,106,.08),0 30px 60px rgba(0,0,0,.7);
      animation:slideUp .18s ease}
    @keyframes slideUp{from{transform:translateY(12px);opacity:.6}to{transform:translateY(0);opacity:1}}
    .modal-panel::before{content:'';position:absolute;top:5px;left:5px;right:5px;bottom:5px;
      border:1px solid rgba(232,201,106,.07);pointer-events:none;z-index:1}
    .modal-corner{position:absolute;width:16px;height:16px;border-color:var(--gold);border-style:solid;z-index:2}
    .mc-tl{top:-1px;left:-1px;border-width:2px 0 0 2px}.mc-tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
    .mc-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}.mc-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

    /* top bar */
    .modal-top{display:flex;align-items:center;justify-content:space-between;
      padding:.8rem 1rem .8rem 1.2rem;border-bottom:1px solid var(--border);gap:1rem;flex-wrap:wrap}
    .modal-status-row{display:flex;gap:.4rem}
    .modal-ctrl{display:flex;gap:.35rem;margin-left:auto}
    .modal-edit-btn,.modal-close-btn{width:30px;height:30px;border-radius:2px;border:1px solid #3a3650;
      background:none;color:#b8b2ac;font-size:.85rem;cursor:pointer;display:flex;align-items:center;
      justify-content:center;transition:all .15s}
    .modal-edit-btn:hover{border-color:var(--gold);color:var(--gold-bright)}
    .modal-edit-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-bright)}
    .modal-close-btn:hover{border-color:#c85050;color:#f09090}

    /* body layout */
    .modal-body{display:flex;gap:1.5rem;padding:1.2rem 1.2rem 1.4rem;flex:1;min-height:0;overflow:hidden}
    .modal-left{flex-shrink:0;width:230px;display:flex;flex-direction:column;gap:.7rem;overflow-y:auto}
    .modal-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:.9rem}

    /* cover in modal */
    .modal-cover{width:230px;aspect-ratio:2/3;background:#0a0a14;border:1px solid var(--border);
      overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
    .modal-cover-img{width:100%;height:100%;object-fit:contain;display:none}
    .modal-cover-img.loaded{display:block}
    .modal-cover-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.4rem;width:100%;height:100%;padding:.5rem}
    .modal-cover-ph .mcp-aquila{font-size:2rem;color:var(--gold);opacity:.2}
    .modal-cover-ph .mcp-text{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-muted);opacity:.4;text-align:center;line-height:1.5}
    .modal-cover-img.loaded + .modal-cover-ph{display:none}
    .modal-upload-area{display:none}
    .modal-upload-area.visible{display:block}
    .modal-upload-btn{width:100%;padding:.45rem;background:none;border:1px dashed #3a3650;
      color:#9a94a2;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;
      text-transform:uppercase;cursor:pointer;transition:all .15s;border-radius:2px}
    .modal-upload-btn:hover{border-color:var(--gold);color:var(--gold)}

    /* fields */
    .mfield{display:flex;flex-direction:column;gap:.25rem}
    .mfield-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;
      text-transform:uppercase;color:var(--gold);opacity:.7}
    .mfield-val{font-size:1rem;color:#ddd7cc;line-height:1.4}
    .mfield-val.title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;
      color:var(--text);letter-spacing:.04em}
    .mfield-val.meta{font-size:.88rem;font-style:italic;color:#9a94a2}
    
    
    .mfield-val.hidden{display:none}

    /* ── RICH TEXT EDITOR ─────────────────────────── */
    .rte-wrap{display:none;flex-direction:column;flex:1;min-height:0;
      border:1px solid #3a3650;border-radius:var(--radius);overflow:hidden;
      transition:border-color .2s}
    .rte-wrap.visible{display:flex}
    .rte-wrap:focus-within{border-color:var(--gold)}
    .rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:.3rem .4rem;
      background:#0a0a14;border-bottom:1px solid #2a2840;flex-shrink:0}
    .rte-btn{width:26px;height:26px;background:none;border:1px solid transparent;
      border-radius:2px;color:var(--gold);font-size:.78rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-family:Georgia,serif;transition:all .15s;flex-shrink:0}
    .rte-btn:hover{background:#1e1c2e;border-color:#3a3650;color:var(--gold-bright)}
    .rte-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-bright)}
    .rte-btn.wide{width:auto;padding:0 .5rem;font-family:'Cinzel',serif;
      font-size:.52rem;letter-spacing:.06em;text-transform:uppercase}
    .rte-divider{width:1px;background:#2a2840;margin:2px 3px;flex-shrink:0}
    .rte-editor{flex:1;overflow-y:auto;padding:.7rem .85rem;background:var(--bg);
      color:var(--text);font-family:'EB Garamond',serif;font-size:.95rem;
      line-height:1.7;outline:none;min-height:0}
    .rte-editor:empty::before{content:attr(data-placeholder);color:var(--text-muted);
      font-style:italic;pointer-events:none}
    .rte-editor b,.rte-editor strong{color:#e8dfd4;font-weight:700}

function switchTab(t){
  const isL=t==='login'
  document.getElementById('loginForm').style.display=isL?'':'none'
  document.getElementById('regForm').style.display=isL?'none':''
  document.getElementById('tabLogin').classList.toggle('active',isL)
  document.getElementById('tabReg').classList.toggle('active',!isL)
  clearMsg()
}
function showMsg(txt,type='error'){
  const el=document.getElementById('authMsg')
  el.className='auth-msg '+type; el.textContent=txt; el.style.display=''
}
function clearMsg(){document.getElementById('authMsg').style.display='none'}

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim()
  const pass=document.getElementById('lPass').value
  if(!email||!pass){showMsg('Please enter your email and password.');return}
  const btn=document.getElementById('loginBtn')
  btn.disabled=true; btn.textContent='Accessing…'
  const {error}=await supabase.auth.signInWithPassword({email,password:pass})
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Access Archive'}
}
async function doRegister(){
  const email=document.getElementById('rEmail').value.trim()
  const pass=document.getElementById('rPass').value
  if(!email||!pass){showMsg('Please fill in all fields.');return}
  if(pass.length<6){showMsg('Password must be at least 6 characters.');return}
  const btn=document.getElementById('regBtn')
  btn.disabled=true; btn.textContent='Creating…'
  const {error}=await supabase.auth.signUp({email,password:pass})
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Create Archive'}
  else{showMsg('Archive created! Check your email to confirm, then sign in.','success');btn.disabled=false;btn.textContent='Create Archive'}
}
async function doLogout(){await supabase.auth.signOut()}

async function loadGlobalBooks(){
  const {data,error} = await supabase.from('books_global').select('*')
  if(error){ console.error('loadGlobalBooks:', error); return }
  globalBooks = {}
  for(const r of (data||[])){
    globalBooks[r.book_id] = {
      cover_image: r.cover_image || null,
      summary:     r.summary     || '',
      db_id:       r.id
    }
  }
}

async function loadUserBooks(){
  const {data,error}=await supabase.from('user_books').select('*').eq('user_id',currentUser.id)
  if(error){console.error(error);return}
  userBooks={}
  for(const r of (data||[])){
    userBooks[r.book_id]={db_id:r.id,owned:r.owned,read:r.read,wishlisted:r.wishlisted,cover_image:r.cover_image||null,summary:r.summary||''}
  }
}

async function saveBook(bookId,updated,prevDbId){
  const payload={user_id:currentUser.id,book_id:bookId,owned:updated.owned,read:updated.read,wishlisted:updated.wishlisted}
  if(prevDbId)payload.id=prevDbId
  const {data,error}=await supabase.from('user_books').upsert(payload,{onConflict:'user_id,book_id'}).select().single()
  if(!error&&data){if(userBooks[bookId])userBooks[bookId].db_id=data.id}
  return error
}

async function toggleStatus(bookId,field){
  if(pending[bookId])return
  pending[bookId]=true

  const prev=userBooks[bookId]||{owned:false,read:false,wishlisted:false}
  const newVal=!prev[field]
  const updated={...prev,[field]:newVal}
  userBooks[bookId]=updated
  updateCard(bookId); updateStats()

  // Cascade to omnibus contents (owned/read only, not wishlist)
  const cascadeIds=[]
  if(field!=='wishlisted'){
    const contents=OMNIBUS_CONTENTS[bookId]
    if(contents){
      for(const cid of contents){
        const cp=userBooks[cid]||{owned:false,read:false,wishlisted:false}
        // only cascade ON (don't auto-remove when omnibus is unticked)
        if(newVal && !cp[field]){
          userBooks[cid]={...cp,[field]:true}
          cascadeIds.push(cid)
        }
      }
    }
  }

  // Save primary
  const err=await saveBook(bookId,updated,prev.db_id)
  if(err){
    userBooks[bookId]=prev
    updateCard(bookId); updateStats()
    pending[bookId]=false; return
  }

  // Save cascaded
  for(const cid of cascadeIds){
    const cp=userBooks[cid]
    const cprev=cp
    await saveBook(cid,cp,cprev.db_id)
    updateCard(cid)
  }
  if(cascadeIds.length)updateStats()

  pending[bookId]=false
}

// ════════════════════════════════════════════════════════════
//  COVER IMAGES
// ════════════════════════════════════════════════════════════
const coverObserver = new IntersectionObserver((entries)=>{
  for(const e of entries){
    if(e.isIntersecting){
      const wrap=e.target
      const bookId=wrap.dataset.bookId
      const title=wrap.dataset.title
      const author=wrap.dataset.author
      coverObserver.unobserve(wrap)
      loadCover(wrap,bookId,title,author)
    }
  }
},{rootMargin:'200px'})

async function loadCover(wrap,bookId,title,author){
    const cached=sessionStorage.getItem('cv_'+bookId)
    if(cached==='NONE'){return}
    if(cached){applyCover(wrap,cached);return}

    // Primary: Open Library (no key needed, great BL coverage)
    const slug=encodeURIComponent(title)
    const olUrl=`https://covers.openlibrary.org/b/title/${slug}-M.jpg`
    try{
      const res=await fetch(olUrl,{cache:'force-cache'})
      if(res.ok){
        const blob=await res.blob()
        if(blob.size>1500){
          const objUrl=URL.createObjectURL(blob)
          sessionStorage.setItem('cv_'+bookId,objUrl)
          applyCover(wrap,objUrl)
          return
        }
      }
    }catch(e){}

    // Fallback: Google Books
    try{
      const q=encodeURIComponent('"'+title+'"')
      const gbUrl='https://www.googleapis.com/books/v1/volumes?q='+q+'&maxResults=1&fields=items(volumeInfo(imageLinks))'
      const res2=await fetch(gbUrl)
      const data=await res2.json()
      const thumb=data.items?.[0]?.volumeInfo?.imageLinks?.thumbnail
      if(thumb){
        const secure=thumb.replace('http:','https:').replace('zoom=1','zoom=2')
        sessionStorage.setItem('cv_'+bookId,secure)
        applyCover(wrap,secure)
        return
      }
    }catch(e){}

    sessionStorage.setItem('cv_'+bookId,'NONE')
  }

function applyCover(wrap,url){
  const img=wrap.querySelector('.cover-img')
  if(!img)return
  img.onload=()=>img.classList.add('loaded')
  img.src=url
}

function getFiltered(){
  return BOOKS.filter(b=>{
    const ub=userBooks[b.id]||{}
    if(activeFilter==='owned'     && !ub.owned)                          return false
    if(activeFilter==='read'      && !ub.read)                           return false
    if(activeFilter==='wishlist'  && !ub.wishlisted)                     return false
    if(activeFilter==='untracked' && (ub.owned||ub.read||ub.wishlisted)) return false
    if(activeType==='Series'      && !SERIES_SUBJECTS.has(b.subject))   return false
    if(activeType!=='all' && activeType!=='Series' && b.type!==activeType) return false
    if(activeSubject!=='all'      && b.subject!==activeSubject)          return false
    if(searchQuery){
      const q=searchQuery.toLowerCase()
      if(!b.title.toLowerCase().includes(q)&&!b.author.toLowerCase().includes(q)) return false
    }
    return true
  })
}

function setFilter(f){
  activeFilter=f
  document.querySelectorAll('[data-filter]').forEach(el=>el.classList.toggle('active',el.dataset.filter===f))
  renderGrid()
}

function setType(t){
  activeType=t
  document.querySelectorAll('[data-type]').forEach(el=>el.classList.toggle('active',el.dataset.type===t))
  activeSubject='all'
  populateSubjects()
  renderGrid()
}

function doSearch(v){searchQuery=v;renderGrid()}
function setSubject(v){activeSubject=v;renderGrid()}

//  RENDER

function renderGrid(){
  const grid=document.getElementById('grid')
  const books=getFiltered()
  document.getElementById('rinfo').textContent=
    books.length===BOOKS.length
      ?`Showing all ${BOOKS.length.toLocaleString()} entries in the archive`
      :`Showing ${books.length.toLocaleString()} of ${BOOKS.length.toLocaleString()} entries`

  if(!books.length){
    grid.innerHTML='<div class="no-res"><p>No tomes match your current filter, Inquisitor.</p></div>'
    return
  }
  grid.innerHTML=books.map(renderCard).join('')
}

function typeClass(t){return t.replace(' ','')}

function renderCard(b){
  const ub    = userBooks[b.id] || {}
  const tc    = b.type.replace(' ','')
  const idx   = BOOKS.indexOf(b)
  const owned = ub.owned      ? ' owned'    : ''
  const read  = ub.read       ? ' read'     : ''
  const wish  = ub.wishlisted ? ' wishlist' : ''
  const oIcon = ub.owned      ? '&#10003;'  : '&#9675;'
  const rIcon = ub.read       ? '&#10003;'  : '&#9675;'
  const wIcon = ub.wishlisted ? '&#9733;'   : '&#9734;'
  const gb2       = globalBooks[b.id] || {}
  const coverHtml = gb2.cover_image
    ? '<img src="' + gb2.cover_image + '" alt="" style="width:100%;height:100%;object-fit:contain"/>'
    : '<span class="ct-ph">&#9869;</span>'
  const cascade = b.type === 'Omnibus'
    ? '<div class="cascade-note">&#8627; Owned/Read updates included titles</div>' : ''
  return '<div class="card" id="card-' + esc(b.id) + '" onclick="OC(' + idx + ')">'
    + '<div class="card-body">'
    +   '<div class="card-meta-col">'
    +     '<div class="card-subject">' + esc(b.subject) + '</div>'
    +     '<div class="card-format t-' + tc + '">' + esc(b.type) + '</div>'
    +     '<div style="flex:1;min-height:.4rem"></div>'
    +     '<div class="c-title">' + esc(b.title) + '</div>'
    +     '<div class="c-meta">' + esc(b.author) + ' &middot; ' + b.year + '</div>'
    +     cascade
    +   '</div>'
    +   '<div class="card-cover-col">'
    +     '<div class="card-thumb">' + coverHtml + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="c-actions">'
    +   '<button class="sbtn' + owned + '" onclick="event.stopPropagation();SC(' + idx + ',0)">' + oIcon + '&nbsp;Owned</button>'
    +   '<button class="sbtn' + read  + '" onclick="event.stopPropagation();SC(' + idx + ',1)">' + rIcon + '&nbsp;Read</button>'
    +   '<button class="sbtn' + wish  + '" onclick="event.stopPropagation();SC(' + idx + ',2)">' + wIcon + '&nbsp;Want</button>'
    + '</div>'
    + '</div>'
}


function updateCard(id){
  const el=document.getElementById('card-'+id)
  if(!el)return
  const b=BOOKS.find(x=>x.id===id)
  if(b){el.outerHTML=renderCard(b)}
  if(activeFilter!=='all')renderGrid()
}

function updateStats(){
  const vals=Object.values(userBooks)
  document.getElementById('sTotal').textContent  = BOOKS.length.toLocaleString()
  document.getElementById('sOwned').textContent  = vals.filter(b=>b.owned).length
  document.getElementById('sRead').textContent   = vals.filter(b=>b.read).length
  document.getElementById('sWish').textContent   = vals.filter(b=>b.wishlisted).length
  document.getElementById('sNovels').textContent = BOOKS.filter(b=>b.type==='Novel').length
  document.getElementById('sAudio').textContent  = BOOKS.filter(b=>b.type==='Audio Drama').length
}

function populateSubjects(){
  let pool=BOOKS
  if(activeType==='Series')     pool=pool.filter(b=>SERIES_SUBJECTS.has(b.subject))
  else if(activeType!=='all')   pool=pool.filter(b=>b.type===activeType)
  const subjects=[...new Set(pool.map(b=>b.subject))].sort()
  const sel=document.getElementById('subjSel')
  sel.innerHTML=`<option value="all">&mdash; All Subjects &mdash;</option>`
    +subjects.map(s=>`<option value="${esc(s)}"${s===activeSubject?' selected':''}>${esc(s)}</option>`).join('')
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let modalBookId   = null
let modalEditMode = false
let pendingCover  = null   // base64 string waiting to be saved

Object.assign(window,{openModal,closeModal,closeModalBg,toggleEditMode,
  cancelEditMode,saveModalEdits,handleCoverUpload,modalToggle})

function openModal(bookId){
  modalBookId   = bookId
  modalEditMode = false
  pendingCover  = null
  const b  = BOOKS.find(x=>x.id===bookId)
  const ub = userBooks[bookId]||{}
  if(!b) return

  // Populate static fields
  document.getElementById('mTitle').textContent   = b.title
  document.getElementById('mAuthor').textContent  = b.author
  document.getElementById('mYear').textContent    = b.year
  document.getElementById('mSubject').textContent = b.subject
  document.getElementById('mFormat').innerHTML    = `<span class="tbadge t-${b.type.replace(' ','')}">${b.type}</span>`
  document.getElementById('modalCoverPhTitle').textContent = b.title

  // Global data (cover + summary) — from books_global, visible to all
  const gb  = globalBooks[bookId] || {}
  const sum = gb.summary || ''
  document.getElementById('mSummaryView').innerHTML = sum || '<em style="color:var(--text-muted);font-style:italic">No summary added yet.</em>'

  // Cover — from global store
  refreshModalCover(gb.cover_image || null)

  // Show/hide edit button based on admin status
  document.getElementById('modalEditBtn').style.display = isAdmin() ? '' : 'none'

  // Status buttons
  refreshModalStatus()

  // Lock mode
  applyEditMode(false)

  document.getElementById('bookModal').style.display='flex'
  document.body.style.overflow='hidden'
}

function closeModal(){
  if(modalEditMode){
    const cur=document.getElementById('rteEditor').innerHTML
    const saved=globalBooks[modalBookId]?.summary||''
    if(pendingCover!==null||cur!==saved){
      if(!confirm('You have unsaved changes. Discard them and close?')) return
    }
    cancelEditMode()
  }
  document.getElementById('bookModal').style.display='none'
  document.body.style.overflow=''
  modalBookId=null
}

function closeModalBg(e){
  if(e.target!==document.getElementById('bookModal')) return
  if(modalEditMode){
    const cur=document.getElementById('rteEditor').innerHTML
    const saved=globalBooks[modalBookId]?.summary||''
    if(pendingCover!==null||cur!==saved){
      if(!confirm('You have unsaved changes. Discard them and close?')) return
    }
    cancelEditMode()
  }
  closeModal()
}

function refreshModalCover(src){
  const img=document.getElementById('modalCoverImg')
  if(src){
    img.onload=()=>img.classList.add('loaded')
    img.src=src
  } else {
    img.src=''; img.classList.remove('loaded')
  }
}

function refreshModalStatus(){
  const ub=userBooks[modalBookId]||{}
  const o=document.getElementById('mBtnOwned')
  const r=document.getElementById('mBtnRead')
  const w=document.getElementById('mBtnWishlist')
  o.className='msbtn'+(ub.owned?' owned':'')
  o.innerHTML=(ub.owned?'&#10003;':'&#9675;')+'&nbsp;Owned'
  r.className='msbtn'+(ub.read?' read':'')
  r.innerHTML=(ub.read?'&#10003;':'&#9675;')+'&nbsp;Read'
  w.className='msbtn'+(ub.wishlisted?' wishlist':'')
  w.innerHTML=(ub.wishlisted?'&#9733;':'&#9734;')+'&nbsp;Want'
}

async function modalToggle(field){
  if(!modalBookId) return
  await toggleStatus(modalBookId, field)
  refreshModalStatus()
}

function toggleEditMode(){
  applyEditMode(!modalEditMode)
}

function applyEditMode(on){
  modalEditMode=on
  // Summary toggle
  document.getElementById('mSummaryView').classList.toggle('hidden',on)
  document.getElementById('rteWrap').classList.toggle('visible',on)
  if(on){
    // Populate editor from globalBooks (admin-managed content)
    const gb=globalBooks[modalBookId]||{}
    const ed=document.getElementById('rteEditor')
    ed.innerHTML=gb.summary||''
    setTimeout(()=>ed.focus(),50)
  }
  // Upload button
  document.getElementById('modalUploadArea').classList.toggle('visible',on)
  // Edit button highlight
  document.getElementById('modalEditBtn').classList.toggle('active',on)
  // Save row
  document.getElementById('modalSaveRow').classList.toggle('visible',on)
}

function cancelEditMode(){
  if(pendingCover){
    const ub=userBooks[modalBookId]||{}
    refreshModalCover(ub.cover_image)
    pendingCover=null
  }
  const ub=userBooks[modalBookId]||{}
  document.getElementById('rteEditor').innerHTML=ub.summary||''
  applyEditMode(false)
}

async function saveModalEdits(){
  if(!modalBookId || !isAdmin()) return
  // Normalize bold formatting before saving
  const rawHTML = document.getElementById('rteEditor').innerHTML
  const tempDiv = document.createElement('div')
  tempDiv.innerHTML = rawHTML
  // Convert any inline font-weight styles to <strong> tags
  tempDiv.querySelectorAll('[style*="font-weight"]').forEach(el => {
    if(el.style.fontWeight === 'bold' || el.style.fontWeight === '700'){
      const strong = document.createElement('strong')
      strong.innerHTML = el.innerHTML
      el.replaceWith(strong)
    } else {
      el.style.fontWeight = ''
    }
  })
  const summary = tempDiv.innerHTML.trim()
  const gb      = globalBooks[modalBookId] || {}
  const coverToSave = pendingCover !== null ? pendingCover : (gb.cover_image || null)

  const btn = document.getElementById('modalSaveRow').querySelector('.modal-save-btn')
  btn.disabled=true; btn.textContent='Saving…'

  // Save cover + summary to books_global (admin only)
  const globalPayload = {
    book_id:     modalBookId,
    cover_image: coverToSave,
    summary:     summary,
    updated_at:  new Date().toISOString()
  }
  if(gb.db_id) globalPayload.id = gb.db_id

  const {data:gData, error:gError} = await supabase
    .from('books_global')
    .upsert(globalPayload, {onConflict:'book_id'})
    .select().single()

  if(gError){
    console.error('Global save error:', gError)
    btn.disabled=false; btn.textContent='Save Changes'
    return
  }

  // Update local global store
  globalBooks[modalBookId] = {
    db_id:       gData.id,
    cover_image: gData.cover_image || null,
    summary:     gData.summary     || ''
  }
  pendingCover = null

  // Refresh display
  document.getElementById('mSummaryView').innerHTML = summary ||
    '<em style="color:var(--text-muted);font-style:italic">No summary added yet.</em>'
  refreshModalCover(gData.cover_image)

  btn.disabled=false; btn.textContent='Save Changes'
  applyEditMode(false)
  updateCard(modalBookId)
}

async function handleCoverUpload(input){
  const file=input.files[0]
  if(!file) return
  // Compress to max 280px wide, JPEG 0.75
  const compressed=await compressImage(file,280,0.78)
  pendingCover=compressed
  refreshModalCover(compressed)
}

function compressImage(file,maxW,quality){
  return new Promise(resolve=>{
    const reader=new FileReader()
    reader.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        // Scale to fit within maxW wide, preserve aspect ratio — no cropping
        const ratio=Math.min(maxW/img.width,1)
        const canvas=document.createElement('canvas')
        canvas.width=Math.round(img.width*ratio)
        canvas.height=Math.round(img.height*ratio)
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height)
        resolve(canvas.toDataURL('image/jpeg',quality))
      }
      img.src=e.target.result
    }
    reader.readAsDataURL(file)
  })
}


// ════════════════════════════════════════════════════════════════════════
//  RICH TEXT EDITOR — custom implementation, no execCommand for formatting
// ════════════════════════════════════════════════════════════════════════
Object.assign(window,{rteCmd,rteBlockquote,rteKeydown,rteUpdateToolbar})

function rteGetEditor(){ return document.getElementById('rteEditor') }

// Toggle a wrapper tag (strong/em/u) around current selection
function rteToggleTag(tagName){
  const ed = rteGetEditor()
  ed.focus()
  const sel = window.getSelection()
  if(!sel || sel.rangeCount===0) return
  const range = sel.getRangeAt(0)
  if(range.collapsed) return

  // Check if selection is already fully wrapped in this tag
  const ancestor = range.commonAncestorContainer
  const parentTag = ancestor.nodeType===3
    ? ancestor.parentElement
    : ancestor
  const alreadyWrapped = parentTag.closest(tagName)

  if(alreadyWrapped){
    // Unwrap: replace the tag with its inner content
    const parent = alreadyWrapped
    const frag = document.createDocumentFragment()
    while(parent.firstChild) frag.appendChild(parent.firstChild)
    parent.replaceWith(frag)
  } else {
    // Wrap selection in new tag
    try{
      const el = document.createElement(tagName)
      range.surroundContents(el)
    } catch(e){
      // Selection spans multiple elements — extract and wrap
      const el = document.createElement(tagName)
      el.appendChild(range.extractContents())
      range.insertNode(el)
    }
  }
  rteUpdateToolbar()
}

function rteCmd(cmd){
  const ed = rteGetEditor()
  ed.focus()
  if(cmd==='bold'){
    rteToggleTag('strong')
  } else if(cmd==='italic'){
    rteToggleTag('em')
  } else if(cmd==='underline'){
    rteToggleTag('u')
  } else if(cmd==='insertUnorderedList'){
    document.execCommand('insertUnorderedList',false,null)
  } else if(cmd==='insertOrderedList'){
    document.execCommand('insertOrderedList',false,null)
  } else if(cmd==='indent'){
    document.execCommand('indent',false,null)
  } else if(cmd==='outdent'){
    document.execCommand('outdent',false,null)
  } else if(cmd==='removeFormat'){
    // Strip all inline formatting tags from selection
    const sel=window.getSelection()
    if(sel&&sel.rangeCount>0){
      const range=sel.getRangeAt(0)
      const frag=range.extractContents()
      const tmp=document.createElement('div')
      tmp.appendChild(frag)
      // Remove formatting tags, keep text
      tmp.querySelectorAll('strong,em,u,b,i,s,[style]').forEach(el=>{
        const txt=document.createTextNode(el.textContent)
        el.replaceWith(txt)
      })
      range.insertNode(tmp)
      // Unwrap the temp div
      const p=tmp.parentNode
      while(tmp.firstChild) p.insertBefore(tmp.firstChild,tmp)
      p.removeChild(tmp)
    }
  }
  rteUpdateToolbar()
}

function rteBlockquote(){
  const ed=rteGetEditor()
  ed.focus()
  const sel=window.getSelection()
  if(!sel||sel.rangeCount===0) return
  const range=sel.getRangeAt(0)
  const bq=document.createElement('blockquote')
  try{
    range.surroundContents(bq)
  }catch(e){
    bq.appendChild(range.extractContents())
    range.insertNode(bq)
  }
  rteUpdateToolbar()
}

function rteUpdateToolbar(){
  const sel=window.getSelection()
  if(!sel||sel.rangeCount===0) return
  const node=sel.anchorNode
  const el=node&&node.nodeType===3?node.parentElement:node

  const inBold   = !!el?.closest('strong,b')
  const inItalic = !!el?.closest('em,i')
  const inUnder  = !!el?.closest('u')
  const inUL     = document.queryCommandState('insertUnorderedList')
  const inOL     = document.queryCommandState('insertOrderedList')

  const map={
    'bold':                inBold,
    'italic':              inItalic,
    'underline':           inUnder,
    'insertUnorderedList': inUL,
    'insertOrderedList':   inOL
  }
  Object.entries(map).forEach(([cmd,active])=>{
    const btn=document.querySelector(`.rte-btn[onclick="rteCmd('${cmd}')"]`)
    if(btn) btn.classList.toggle('active',active)
  })
}

function rteKeydown(e){
  if(e.key==='Tab'){
    e.preventDefault()
    e.shiftKey ? rteCmd('outdent') : rteCmd('indent')
  }
  if(e.ctrlKey||e.metaKey){
    if(e.key==='b'){e.preventDefault();rteCmd('bold')}
    if(e.key==='i'){e.preventDefault();rteCmd('italic')}
    if(e.key==='u'){e.preventDefault();rteCmd('underline')}
  }
}
