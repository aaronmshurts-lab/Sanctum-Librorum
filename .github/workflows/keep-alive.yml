name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 12:00 UTC
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Also allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            "https://yzhoqdjhttdztorcsbdt.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_MZpvQ3ySRm8l_saadAeKFw_GAKYPPa6" \
            -H "Authorization: Bearer sb_publishable_MZpvQ3ySRm8l_saadAeKFw_GAKYPPa6"
          echo " — Supabase pinged successfully"
